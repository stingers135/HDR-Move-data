            }
            return boneName;
        }
        
        // Calculate hitbox screen positions for a given frame
        function calculateHitboxPositionsForFrame(realFrame, positions) {
            if (!hitboxData) return {};
            
            const gameFrame = realFrame + 1;  // Convert to 1-indexed
            const frameHitboxes = hitboxData.hitboxes_by_frame[String(gameFrame)] || [];
            const hitboxPositions = {};
            
            frameHitboxes.forEach(hitbox => {
                let screenX, screenY;
                let sX2, sY2;  // Second endpoint for capsule hitboxes
                
                // Check if this hitbox uses projectile positioning (per-hitbox or move-level)
                const useProj = hitbox.is_projectile ? true : !!projectileData;
                const projData = hitbox.is_projectile ? (hitbox.projectile_data || projectileData) : projectileData;
                if (useProj && projData && hitbox.bone === 'top') {
                    const spawn = projData.spawn_offset || {x: 0, y: 0, z: 0};
                    const vel = projData.velocity || {x: 0, y: 0, z: 0};
                    
                    // Get first active frame for this move
                    const activeFrames = Object.keys(hitboxData.hitboxes_by_frame).map(Number).sort((a,b) => a-b);
                    const firstActiveFrame = activeFrames[0] || gameFrame;
                    const projSpawnFrame = hitbox.projectile_spawn_frame || firstActiveFrame;
                    
                    // Frames since spawn
                    const framesSinceSpawn = Math.max(0, gameFrame - projSpawnFrame);
                    
                    if (projectileSpawnPos) {
                        const projZ = projectileSpawnPos.z + spawn.z + vel.z * framesSinceSpawn;
                        const projY = projectileSpawnPos.y + spawn.y + vel.y * framesSinceSpawn;
                        screenX = projZ * SCALE + CENTER_X;
                        screenY = -projY * SCALE + CENTER_Y;
                    } else {
                        return;  // No spawn position cached
                    }
                } else {
                    // Normal bone-attached hitbox
                    const boneName = remapBone(hitbox.bone.toLowerCase(), positions);
                    let useBone = positions[boneName];
                    
                    // 'top' is the skeleton root bone and stays at origin (0,0,0).
                    // In-game, hitboxes on 'top' use the character's physics position,
                    // which tracks with the body. Use 'trans' bone instead (first bone
                    // that actually translates) so hitboxes follow the body during
                    // sliding moves like Mega Man dtilt.
                    if (boneName === 'top' || boneName === 'throw') {
                        useBone = positions['trans'] || positions['rot'] || positions['hip'] || useBone;
                    }
                    
                    if (!useBone) return;
                    
                    const offset = hitbox.offset || {x: 0, y: 0, z: 0};
                    const rotOnly = normalizeMatrixRotation(useBone.matrix);
                    const worldPos = transformPoint(offset, rotOnly);
                    
                    if (boneName === 'top' || boneName === 'throw') {
                        screenX = (useBone.worldZ + offset.z) * SCALE + CENTER_X;
                        screenY = -(useBone.worldY + offset.y) * SCALE + CENTER_Y;
                    } else {
                        screenX = worldPos.z * SCALE + CENTER_X;
                        screenY = -worldPos.y * SCALE + CENTER_Y;
                    }
                    
                    // Capsule second endpoint
                    if (hitbox.is_capsule && hitbox.offset2) {
                        const off2 = hitbox.offset2;
                        if (boneName === 'top' || boneName === 'throw') {
                            sX2 = (useBone.worldZ + off2.z) * SCALE + CENTER_X;
                            sY2 = -(useBone.worldY + off2.y) * SCALE + CENTER_Y;
                        } else {
                            const wp2 = transformPoint(off2, rotOnly);
                            sX2 = wp2.z * SCALE + CENTER_X;
                            sY2 = -wp2.y * SCALE + CENTER_Y;
                        }
                    }
                }
                
                hitboxPositions[hitbox.id] = {
                    x: screenX,
                    y: screenY,
                    x2: sX2,
                    y2: sY2,
                    isCapsule: !!(hitbox.is_capsule && hitbox.offset2),
                    size: hitbox.size || 3,
                    damage: hitbox.damage,
                    angle: hitbox.angle,
                    bone: hitbox.bone
                };
            });
            
            return hitboxPositions;
        }
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Display frames as 1-indexed (game convention)
            document.getElementById('frame-num').textContent = currentFrame + 1;
            document.getElementById('frame-slider').value = currentFrame;
            
            // Show animation frame if different from real frame
            const animPos2 = Math.max(0, getAnimationFrame(currentFrame));
            const animFrameDisplay = Math.floor(animPos2);
            if (animFrameDisplay !== currentFrame) {
                // Show the animation position (0-indexed, matches script frame() values)
                const displayVal = animPos2.toFixed(1).replace(/\.0$/, '');
                document.getElementById('anim-frame-display').textContent = `(anim: ${displayVal})`;
            } else {
                document.getElementById('anim-frame-display').textContent = '';
            }
            
            if (!skeletonData) {
                ctx.fillStyle = '#666';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Loading skeleton...', canvas.width/2, canvas.height/2);
                return;
            }
            
            const worldTransforms = calculateWorldTransforms();
            
            const positions = {};
            Object.entries(worldTransforms).forEach(([name, data]) => {
                const m = data.matrix;
                // Use -Z for hitbox alignment, then negate for display (character faces right)
                // The double negation means we use +Z for skeleton display
                positions[name] = {
                    x: m[3][2] * SCALE + CENTER_X,  // +Z = character faces right
                    y: -m[3][1] * SCALE + CENTER_Y,
                    z: m[3][0],
                    worldX: m[3][0],
                    worldY: m[3][1],
                    worldZ: m[3][2],
                    matrix: m,
                    parentIndex: data.parentIndex
                };
            });
            
            // Draw skeleton (controlled by checkbox, which is set by hdrdle hints)
            if (document.getElementById('show-skeleton').checked) {
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 2;
                
                // Only draw connections for original bone names (not lowercase duplicates)
                skeletonData.bones.forEach((bone, i) => {
                    const pos = positions[bone.name];
                    if (!pos) return;
                    
                    if (bone.parent_index !== null && bone.parent_index >= 0) {
                        const parentName = skeletonData.bones[bone.parent_index].name;
                        const parentPos = positions[parentName];
                        if (parentPos) {
                            ctx.beginPath();
                            ctx.moveTo(parentPos.x, parentPos.y);
                            ctx.lineTo(pos.x, pos.y);
                            ctx.stroke();
                        }
                    }
                });
                
                ctx.fillStyle = '#2196F3';
                skeletonData.bones.forEach(bone => {
                    const pos = positions[bone.name];
                    if (!pos) return;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                });
                
                if (document.getElementById('show-names').checked) {
                    ctx.fillStyle = '#2196F3';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'left';
                    skeletonData.bones.forEach(bone => {
                        const pos = positions[bone.name];
                        if (!pos) return;
                        ctx.fillText(bone.name, pos.x + 6, pos.y);
                    });
                }
            }
            
            // Draw hurtboxes (controlled by checkbox, which is set by hdrdle hints)
            if (hurtboxData && document.getElementById('show-hurtboxes').checked) {
                hurtboxData.forEach(hurtbox => {
                    if (!hurtbox.bone_name) return;
                    
                    // Skip hurtboxes that are disabled (hit_status_off)
                    if (hurtbox.status === 'hit_status_off') return;
                    
                    const boneLower = hurtbox.bone_name.toLowerCase();
                    
                    // Use lowercase for case-insensitive matching
                    const hurtBoneName = remapBone(boneLower, positions);
                    const bonePos = positions[hurtBoneName];
                    if (!bonePos) return;
                    
                    const start = transformPoint(hurtbox.start, bonePos.matrix);
                    const end = transformPoint(hurtbox.end, bonePos.matrix);
                    
                    // Use +Z for horizontal (matches skeleton)
                    drawCapsule(
                        { x: start.z * SCALE + CENTER_X, y: -start.y * SCALE + CENTER_Y },
                        { x: end.z * SCALE + CENTER_X, y: -end.y * SCALE + CENTER_Y },
                        hurtbox.radius * SCALE,
                        'rgba(255, 235, 59, 0.3)', 'rgba(255, 235, 59, 0.8)'
                    );
                });
            }
            
            // Draw hitboxes with frame interpolation
            if (hitboxData && document.getElementById('show-hitboxes').checked) {
                // Hitbox JSON uses 1-indexed game frame numbers as keys
                const gameFrame = currentFrame + 1;
                const frameHitboxes = hitboxData.hitboxes_by_frame[String(gameFrame)] || [];
                
                // Calculate current frame positions for all hitboxes
                const currentPositions = {};
                
                // Get first active frame for projectile calculation
                const firstActiveFrame = hitboxData.active_frames && hitboxData.active_frames.length > 0 
                    ? hitboxData.active_frames[0] : gameFrame;
                
                frameHitboxes.forEach(hitbox => {
                    let screenX, screenY;
                    let screenX2, screenY2;  // Second endpoint for capsule hitboxes
                    
                    // Determine if this hitbox uses projectile positioning:
                    // Per-hitbox is_projectile flag takes priority, then move-level projectileData
                    const useProjectile = hitbox.is_projectile ? true : !!projectileData;
                    const projData = hitbox.is_projectile ? (hitbox.projectile_data || projectileData) : projectileData;
                    
                    if (useProjectile && projData) {
                        // Get character center position for reference
                        const charCenter = positions['trans'] || positions['rot'] || positions['hip'];
                        
                        // On the first active frame, cache the spawn position
                        if (gameFrame === firstActiveFrame || !projectileSpawnPos) {
                            if (charCenter) {
                                projectileSpawnPos = {
                                    z: charCenter.worldZ,
                                    y: charCenter.worldY
                                };
                            } else {
                                projectileSpawnPos = { z: 0, y: 0 };
                            }
                        }
                        
                        // Calculate projectile position based on trajectory from SPAWN position
                        const spawn = projData.spawn_offset || {x: 0, y: 0, z: 0};
                        const vel = projData.velocity || {x: 0, y: 0, z: 0};
                        // For per-hitbox projectiles, use the hitbox's own spawn frame if available
                        const projSpawnFrame = hitbox.projectile_spawn_frame || firstActiveFrame;
                        const framesSinceSpawn = gameFrame - projSpawnFrame;
                        
                        // Position = spawn_position + spawn_offset + velocity * frames
                        const projZ = projectileSpawnPos.z + spawn.z + vel.z * Math.max(0, framesSinceSpawn);
                        const projY = projectileSpawnPos.y + spawn.y + vel.y * Math.max(0, framesSinceSpawn);
                        
                        // Convert to screen coordinates
                        screenX = projZ * SCALE + CENTER_X;
                        screenY = -projY * SCALE + CENTER_Y;
                    } else {
                        // Normal bone-attached hitbox
                        const boneName = remapBone(hitbox.bone.toLowerCase(), positions);
                        let useBone = positions[boneName];
                        
                        // Use trans bone for 'top'/'throw' hitboxes (see main hitbox code comment)
                        if (boneName === 'top' || boneName === 'throw') {
                            useBone = positions['trans'] || positions['rot'] || positions['hip'] || useBone;
                        }
                        
                        if (!useBone) {
                            return;
                        }
                        
                        const offset = hitbox.offset || {x: 0, y: 0, z: 0};
                        // Normalize rotation columns so offsets are rotated but not
                        // scaled — matches how Smash Ultimate applies ATTACK offsets.
                        const rotOnly = normalizeMatrixRotation(useBone.matrix);
                        const worldPos = transformPoint(offset, rotOnly);
                        
                        if (boneName === 'top' || boneName === 'throw') {
                            screenX = (useBone.worldZ + offset.z) * SCALE + CENTER_X;
                            screenY = -(useBone.worldY + offset.y) * SCALE + CENTER_Y;
                        } else {
                            screenX = worldPos.z * SCALE + CENTER_X;
                            screenY = -worldPos.y * SCALE + CENTER_Y;
                        }
                        
                        // Compute second endpoint for capsule hitboxes
                        if (hitbox.is_capsule && hitbox.offset2) {
                            const off2 = hitbox.offset2;
                            if (boneName === 'top' || boneName === 'throw') {
                                screenX2 = (useBone.worldZ + off2.z) * SCALE + CENTER_X;
                                screenY2 = -(useBone.worldY + off2.y) * SCALE + CENTER_Y;
                            } else {
                                const wp2 = transformPoint(off2, rotOnly);
                                screenX2 = wp2.z * SCALE + CENTER_X;
                                screenY2 = -wp2.y * SCALE + CENTER_Y;
                            }
                        }
                    }
                    
                    // Store position for this hitbox
                    currentPositions[hitbox.id] = {
                        x: screenX,
                        y: screenY,
                        x2: screenX2,
                        y2: screenY2,
                        isCapsule: !!(hitbox.is_capsule && hitbox.offset2),
                        size: hitbox.size || 3,
                        damage: hitbox.damage,
                        angle: hitbox.angle,
                        bone: hitbox.bone
                    };
                });
                
                // Calculate previous frame positions on-demand for interpolation
                const showInterpolation = document.getElementById('show-interpolation').checked;
                let prevPositions = {};
                
                if (showInterpolation && currentFrame > 0) {
                    // Check if previous frame has hitboxes
                    const prevGameFrame = currentFrame;  // currentFrame is 0-indexed, so this is prev game frame
                    const prevFrameHitboxes = hitboxData.hitboxes_by_frame[String(prevGameFrame)] || [];
                    
                    if (prevFrameHitboxes.length > 0) {
                        // Calculate world transforms for previous frame
                        const prevWorldTransforms = calculateWorldTransformsForFrame(currentFrame - 1);
                        
                        // Build positions lookup for previous frame
                        const prevBonePositions = {};
                        Object.entries(prevWorldTransforms).forEach(([name, data]) => {
                            const m = data.matrix;
                            prevBonePositions[name] = {
                                x: m[3][2] * SCALE + CENTER_X,
                                y: -m[3][1] * SCALE + CENTER_Y,
                                z: m[3][0],
                                worldZ: m[3][2],
                                worldY: m[3][1],
                                matrix: m,
                                parentIndex: data.parentIndex
                            };
                        });
                        
                        // Calculate hitbox positions for previous frame
                        prevFrameHitboxes.forEach(hitbox => {
                            let screenX, screenY;
                            
                            const useProj = hitbox.is_projectile ? true : !!projectileData;
                            const projData = hitbox.is_projectile ? (hitbox.projectile_data || projectileData) : projectileData;
                            if (useProj && projData && projectileSpawnPos) {
                                const spawn = projData.spawn_offset || {x: 0, y: 0, z: 0};
                                const vel = projData.velocity || {x: 0, y: 0, z: 0};
                                const projSpawnFrame = hitbox.projectile_spawn_frame || firstActiveFrame;
                                const framesSinceSpawn = prevGameFrame - projSpawnFrame;
                                
                                const projZ = projectileSpawnPos.z + spawn.z + vel.z * Math.max(0, framesSinceSpawn);
                                const projY = projectileSpawnPos.y + spawn.y + vel.y * Math.max(0, framesSinceSpawn);
                                
                                screenX = projZ * SCALE + CENTER_X;
                                screenY = -projY * SCALE + CENTER_Y;
                            } else {
                                const boneName = remapBone(hitbox.bone.toLowerCase(), prevBonePositions);
                                let useBone = prevBonePositions[boneName];
                                
                                if (boneName === 'top' || boneName === 'throw') {
                                    useBone = prevBonePositions['trans'] || prevBonePositions['rot'] || prevBonePositions['hip'] || useBone;
                                }
                                
                                if (!useBone) return;
                                
                                const offset = hitbox.offset || {x: 0, y: 0, z: 0};
                                const rotOnly = normalizeMatrixRotation(useBone.matrix);
                                const worldPos = transformPoint(offset, rotOnly);
                                
                                if (boneName === 'top' || boneName === 'throw') {
                                    screenX = (useBone.worldZ + offset.z) * SCALE + CENTER_X;
                                    screenY = -(useBone.worldY + offset.y) * SCALE + CENTER_Y;
                                } else {
                                    screenX = worldPos.z * SCALE + CENTER_X;
                                    screenY = -worldPos.y * SCALE + CENTER_Y;
                                }
                            }
                            
                            prevPositions[hitbox.id] = {
                                x: screenX,
                                y: screenY,
                                size: hitbox.size || 3,
                                bone: hitbox.bone,
                                is_capsule: !!hitbox.is_capsule
                            };
                        });
                    }
                }
                
                // Draw hitboxes
                frameHitboxes.forEach(hitbox => {
                    const curr = currentPositions[hitbox.id];
                    if (!curr) return;
                    
                    const prev = prevPositions[hitbox.id];
                    
                    let startX, startY, endX, endY;
                    
                    if (curr.isCapsule && curr.x2 !== undefined) {
                        // Capsule hitbox: draw between offset1 and offset2 (no interpolation)
                        startX = curr.x;
                        startY = curr.y;
                        endX = curr.x2;
                        endY = curr.y2;
                    } else {
                        // Non-capsule (sphere): single point, optionally interpolated
                        startX = curr.x;
                        startY = curr.y;
                        endX = curr.x;
                        endY = curr.y;
                        
                        if (showInterpolation && prev) {
                            // Skip interpolation if either frame's hitbox is capsule-shaped.
                            // In-game, capsule hitboxes don't produce interpolation trails.
                            // Also skip if the hitbox is a projectile (not bone-attached).
                            const prevIsCapsule = prev.is_capsule;
                            const currIsCapsule = !!hitbox.is_capsule;
                            if (!prevIsCapsule && !currIsCapsule && !hitbox.is_projectile) {
                                startX = prev.x;
                                startY = prev.y;
                                endX = curr.x;
                                endY = curr.y;
                            }
                        }
                    }
                    
                    drawCapsule(
                        { x: startX, y: startY },
                        { x: endX, y: endY },
                        curr.size * SCALE,
                        'rgba(244, 67, 54, 0.4)', 'rgba(244, 67, 54, 0.9)'
                    );
                    
                    // Draw damage/angle labels at midpoint for capsules, current pos otherwise
                    const labelX = curr.isCapsule ? (curr.x + curr.x2) / 2 : curr.x;
                    const labelY = curr.isCapsule
                        ? Math.min(curr.y, curr.y2) - curr.size * SCALE - 5
                        : curr.y - curr.size * SCALE - 5;
                    
                    const showDamage = !(hdrdleMode && hdrdleHideDamage);
                    const showAngle = !(hdrdleMode && hdrdleHideAngle);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Arial';
                    ctx.textAlign = 'center';
                    
                    if (showDamage && showAngle) {
                        if (curr.damage) ctx.fillText(curr.damage + '%', labelX, labelY);
                        if (curr.angle != null) ctx.fillText(curr.angle + '°', labelX, labelY - 14);
                    } else if (showDamage) {
                        if (curr.damage) ctx.fillText(curr.damage + '%', labelX, labelY);
                    } else if (showAngle) {
                        if (curr.angle != null) ctx.fillText(curr.angle + '°', labelX, labelY);
                    }
                });
                
                updateHitboxList(frameHitboxes);
            } else {
                // No hitboxes this frame
            }
            
            // Draw frame counter overlay in hdrdle mode (top-right corner)
            if (hdrdleMode && hdrdleShowFrameCounter) {
                const frameText = `Frame ${currentFrame + 1}`;
                ctx.save();
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'right';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                const metrics = ctx.measureText(frameText);
                const pad = 6;
                ctx.fillRect(canvas.width - metrics.width - pad * 3, 4, metrics.width + pad * 2, 24);
                ctx.fillStyle = '#00cc44';
                ctx.fillText(frameText, canvas.width - pad * 2, 22);
                ctx.restore();
            }
        }
        
        function drawCapsule(start, end, radius, fill, stroke) {
            ctx.strokeStyle = stroke;
            ctx.fillStyle = fill;
            ctx.lineWidth = 2;
            
            // If start and end are same, just draw a circle
            if (Math.abs(start.x - end.x) < 0.1 && Math.abs(start.y - end.y) < 0.1) {
                ctx.beginPath();
                ctx.arc(start.x, start.y, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
                return;
            }
            
            // Draw a proper capsule (stadium shape)
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const angle = Math.atan2(dy, dx);
            const perpAngle = angle + Math.PI / 2;
            
            // Calculate the four corners of the rectangle part
            const offsetX = Math.cos(perpAngle) * radius;
            const offsetY = Math.sin(perpAngle) * radius;
            
            ctx.beginPath();
            // Start cap (semicircle)
            ctx.arc(start.x, start.y, radius, angle + Math.PI/2, angle - Math.PI/2);
            // Top edge
            ctx.lineTo(end.x - offsetX, end.y - offsetY);
            // End cap (semicircle)
            ctx.arc(end.x, end.y, radius, angle - Math.PI/2, angle + Math.PI/2);
            // Bottom edge
            ctx.lineTo(start.x + offsetX, start.y + offsetY);
            ctx.closePath();
            
            ctx.fill();
            ctx.stroke();
        }
        
        function updateHitboxList(hitboxes) {
            const container = document.getElementById('hitbox-list');
            if (!hitboxes || hitboxes.length === 0) {
                container.innerHTML = '<p style="color: #666;">No hitboxes active</p>';
                return;
            }
            
            let html = '';
            hitboxes.forEach(hb => {
                html += `
                    <div class="hitbox-card">
                        <strong>ID ${hb.id}</strong> (${hb.bone})
                        <div class="stat"><span class="stat-label">Damage:</span><span class="stat-value">${hb.damage || 'N/A'}%</span></div>
                        <div class="stat"><span class="stat-label">Angle:</span><span class="stat-value">${hb.angle || 'N/A'}°</span></div>
                        <div class="stat"><span class="stat-label">KBG:</span><span class="stat-value">${hb.kbg || 'N/A'}</span></div>
                        <div class="stat"><span class="stat-label">BKB:</span><span class="stat-value">${hb.bkb || 'N/A'}</span></div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function frameHasHitboxes(frame) {
            if (!hitboxData || !hitboxData.hitboxes_by_frame) return false;
            const gameFrame = frame + 1;
            const hbs = hitboxData.hitboxes_by_frame[String(gameFrame)];
            return hbs && hbs.length > 0;
        }
        
        function getEffectiveSpeed() {
            if (!hdrdleMode || !hdrdleAutoPlay) return playbackSpeed;
            return frameHasHitboxes(currentFrame) ? 0.2 : 4;  // 0.1x vs 2x
        }
        
        function startPlayTimer() {
            clearTimeout(playTimer);
            
            function tick() {
                const max = getMaxFrame();
                const nextFrame = (currentFrame + 1) % (max + 1);
                currentFrame = nextFrame;
                updateHitboxFrameHighlight();
                render();
                
                if (isPlaying) {
                    const speed = getEffectiveSpeed();
                    playTimer = setTimeout(tick, 1000 / (30 * speed));
                }
            }
            
            const speed = getEffectiveSpeed();
            playTimer = setTimeout(tick, 1000 / (30 * speed));
        }
        
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('play-btn').textContent = isPlaying ? '⏸ Pause' : '▶ Play';
            
            if (isPlaying) {
                startPlayTimer();
            } else {
                clearTimeout(playTimer);
            }
        }
        
        function setSpeed(speed, btn) {
            playbackSpeed = speed === 1 ? 2 : speed === 0.5 ? 1 : 0.5;
            document.querySelectorAll('.speed-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (isPlaying) {
                startPlayTimer();
            }
        }
        
        function changeFrame(delta) {
            const max = getMaxFrame();
            
            const nextFrame = (currentFrame + delta + max + 1) % (max + 1);
            currentFrame = nextFrame;
            updateHitboxFrameHighlight();
            render();
        }
        
        document.getElementById('frame-slider').addEventListener('input', (e) => {
            const newFrame = parseInt(e.target.value);
            currentFrame = newFrame;
            updateHitboxFrameHighlight();
            render();
        });
        
        ['show-skeleton', 'show-hurtboxes', 'show-hitboxes', 'show-interpolation', 'show-names'].forEach(id => {
            document.getElementById(id).addEventListener('change', render);
        });
        
        // Load data
        function populateHitboxFramesList() {
            const container = document.getElementById('hitbox-frames-list');
            
            if (!hitboxData || !hitboxData.hitboxes_by_frame) {
                container.innerHTML = '<p style="color: #666; font-size: 0.85em;">No hitbox data</p>';
                return;
            }
            
            // Get all frames that have hitboxes
            const framesWithHitboxes = Object.keys(hitboxData.hitboxes_by_frame)
                .map(Number)
                .filter(f => hitboxData.hitboxes_by_frame[String(f)].length > 0)
                .sort((a, b) => a - b);
            
            if (framesWithHitboxes.length === 0) {
                container.innerHTML = '<p style="color: #666; font-size: 0.85em;">No active hitboxes</p>';
                return;
            }
            
            // Group consecutive frames into ranges
            const ranges = [];
            let rangeStart = framesWithHitboxes[0];
            let rangeEnd = framesWithHitboxes[0];
            
            for (let i = 1; i < framesWithHitboxes.length; i++) {
                if (framesWithHitboxes[i] === rangeEnd + 1) {
                    rangeEnd = framesWithHitboxes[i];
                } else {
                    ranges.push({ start: rangeStart, end: rangeEnd });
                    rangeStart = framesWithHitboxes[i];
                    rangeEnd = framesWithHitboxes[i];
                }
            }
            ranges.push({ start: rangeStart, end: rangeEnd });
            
            // Build HTML - display as ranges with clickable buttons
            // Note: hitbox data keys are already 1-indexed game frames, so don't add 1
            let html = '<div style="display: flex; flex-wrap: wrap; gap: 4px;">';
            
            for (const range of ranges) {
                // Data keys are game frame numbers (1-indexed), display them directly
                // But jumpToFrame needs 0-indexed currentFrame, so subtract 1
                const displayStart = range.start;
                const displayEnd = range.end;
                const jumpStart = range.start - 1;  // Convert to 0-indexed for currentFrame
                
                if (range.start === range.end) {
                    // Single frame
                    html += `<span class="frame-btn" data-frame="${jumpStart}" onclick="jumpToFrame(${jumpStart})">${displayStart}</span>`;
                } else {
                    // Range of frames - clicking goes to start of range
                    html += `<span class="frame-range" data-frame-start="${jumpStart}" data-frame-end="${range.end - 1}" onclick="jumpToFrame(${jumpStart})">${displayStart}-${displayEnd}</span>`;
                }
            }
            
            html += '</div>';
            container.innerHTML = html;
            
            // Update active state for current frame
            updateHitboxFrameHighlight();
        }
        
        function jumpToFrame(frame) {
            currentFrame = frame;
            document.getElementById('frame-slider').value = frame;
            updateHitboxFrameHighlight();
            render();
        }
        
        function updateHitboxFrameHighlight() {
            // Remove active class from all frame buttons
            document.querySelectorAll('.frame-btn, .frame-range').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Add active class to current frame's button
            const singleFrameBtn = document.querySelector(`.frame-btn[data-frame="${currentFrame}"]`);
            if (singleFrameBtn) {
                singleFrameBtn.classList.add('active');
            }
            
            // Check if current frame is in a range
            document.querySelectorAll('.frame-range').forEach(rangeBtn => {
                const start = parseInt(rangeBtn.dataset.frameStart);
                const end = parseInt(rangeBtn.dataset.frameEnd);
                if (currentFrame >= start && currentFrame <= end) {
                    rangeBtn.classList.add('active');
                }
            });
        }
        
        async function loadData() {
            document.getElementById('character-name').textContent = character;
            document.getElementById('move-name').textContent = move + (stanceParam ? ' (' + stanceParam + ')' : '');
            
            let loaded = [];
            let failed = [];
            
            // Get folder name for characters with special folder mappings (e.g., Ice Climbers)
            const charFolder = getCharacterFolder(character);
            // Get special skeleton/hurtbox names (e.g., Mii characters)
            const skelName = getSkeletonName(character);
            const hurtName = getHurtboxName(character);
            
            // Cache-busting parameter to prevent stale JSON data
            const cacheBust = `?v=${Date.now()}`;
            
            try {
                // Load skeleton - try character name, folder name, and special skeleton name
                let skelRes = await fetch(`data/skeletons/${character}_skeleton.json${cacheBust}`);
                if (!skelRes.ok && charFolder !== character) {
                    skelRes = await fetch(`data/skeletons/${charFolder}_skeleton.json${cacheBust}`);
                }
                if (!skelRes.ok && skelName !== character) {
                    skelRes = await fetch(`data/skeletons/${skelName}_skeleton.json${cacheBust}`);
                }
                if (skelRes.ok) {
                    skeletonData = await skelRes.json();
                    loaded.push('skeleton');
                } else {
                    failed.push('skeleton');
                }
                
                // Load hurtboxes - try character name, folder name, and special hurtbox name
                let hurtRes = await fetch(`data/hurtboxes/${character}_hurtboxes.json${cacheBust}`);
                if (!hurtRes.ok && charFolder !== character) {
                    hurtRes = await fetch(`data/hurtboxes/${charFolder}_hurtboxes.json${cacheBust}`);
                }
                if (!hurtRes.ok && hurtName !== character) {
                    hurtRes = await fetch(`data/hurtboxes/${hurtName}_hurtboxes.json${cacheBust}`);
                }
                if (hurtRes.ok) {
                    hurtboxData = await hurtRes.json();
                    loaded.push('hurtboxes');
                } else {
                    failed.push('hurtboxes');
                }
                
                // Load hitboxes - try both character name and folder name
                let hitRes = await fetch(`data/hitboxes/${character}_hitboxes.json${cacheBust}`);
                if (!hitRes.ok && charFolder !== character) {
                    hitRes = await fetch(`data/hitboxes/${charFolder}_hitboxes.json${cacheBust}`);
                }
                if (hitRes.ok) {
                    const allHitboxes = await hitRes.json();
                    allHitboxesCache = allHitboxes;  // Cache for stance switching
                    
                    // Map variant move types to their base move for hitbox lookup
                    const HITBOX_MOVE_FALLBACK = {
                        'ftilt2': 'ftilt',
                        'fsmash2': 'fsmash',
                        'fsmash3': 'fsmash',
                        'fthrow_forward': 'fthrow',
                        'fthrow_back': 'fthrow',
                        'fthrow_high': 'fthrow',
                        'fthrow_low': 'fthrow',
                        'jab1_weak': 'jab1',
                        'jab1_strong': 'jab1',
                        'jab2_weak': 'jab2',
                        'jab2_strong': 'jab2',
                        'ftilt_weak': 'ftilt',
                        'ftilt_strong': 'ftilt',
                        'utilt_weak': 'utilt',
                        'utilt_strong': 'utilt',
                        'dtilt_weak': 'dtilt',
                        'dtilt_strong': 'dtilt',
                    };
                    
                    // Check for stance system
                    if (allHitboxes.has_stances && allHitboxes.stance_data && stanceParam) {
                        // Stance-based character - use stance from URL param
                        currentStance = stanceParam;
                        const stanceMoves = allHitboxes.stance_data[currentStance] || {};
                        hitboxData = stanceMoves[move] || null;
                        if (!hitboxData && HITBOX_MOVE_FALLBACK[move]) {
                            hitboxData = stanceMoves[HITBOX_MOVE_FALLBACK[move]] || null;
                        }
                    } else if (allHitboxes.has_stances && allHitboxes.stance_data) {
                        // Stance character but no stance param - default to first stance
                        const stanceNames = allHitboxes.stance_names || Object.keys(allHitboxes.stance_data);
                        currentStance = stanceNames[0];
                        const stanceMoves = allHitboxes.stance_data[currentStance] || {};
                        hitboxData = stanceMoves[move] || null;
                        if (!hitboxData && HITBOX_MOVE_FALLBACK[move]) {
                            hitboxData = stanceMoves[HITBOX_MOVE_FALLBACK[move]] || null;
                        }
                    } else {
                        hitboxData = allHitboxes.moves ? allHitboxes.moves[move] : null;
                        if (!hitboxData && HITBOX_MOVE_FALLBACK[move]) {
                            hitboxData = allHitboxes.moves ? allHitboxes.moves[HITBOX_MOVE_FALLBACK[move]] : null;
                        }
                    }
                    
                    if (hitboxData) {
                        loaded.push('hitboxes');
                        // Get motion events for frame calculation
                        motionEvents = hitboxData.motion_events || null;
                        // Load FAF (First Actionable Frame) if available
                        fafFrame = hitboxData.faf || null;
                        // Update FAF display in info panel
                        const fafInfoEl = document.getElementById('faf-info');
                        const fafValueEl = document.getElementById('faf-value');
                        if (fafFrame !== null && fafInfoEl && fafValueEl) {
                            fafInfoEl.style.display = '';
                            fafValueEl.textContent = fafFrame;
                        } else if (fafInfoEl) {
                            fafInfoEl.style.display = 'none';
                        }
                        // Get projectile data if this is a projectile move
                        if (hitboxData.is_projectile && hitboxData.projectile) {
                            projectileData = hitboxData.projectile;
                            projectileSpawnPos = null;  // Reset spawn position cache for new move
                        } else {
                            projectileData = null;
                            projectileSpawnPos = null;
                        }
                        
                        // Check if all hitboxes across all frames are capsule-shaped.
                        // Capsule hitboxes (offset2 is not None, even if all zeros)
                        // don't interpolate in-game, so we disable the trail for them.
                        // If ALL hitboxes are capsule → grey out checkbox entirely.
                        // If mixed → leave clickable, per-frame skipping in render loop.
                        let totalHitboxes = 0;
                        let capsuleHitboxes = 0;
                        for (const frameHbs of Object.values(hitboxData.hitboxes_by_frame || {})) {
                            for (const hb of frameHbs) {
                                totalHitboxes++;
                                if (hb.is_capsule) capsuleHitboxes++;
                            }
                        }
                        const allCapsule = totalHitboxes > 0 && capsuleHitboxes === totalHitboxes;
                        
                        const interpCheckbox = document.getElementById('show-interpolation');
                        if (allCapsule) {
                            interpCheckbox.checked = false;
                            interpCheckbox.disabled = true;
                            interpCheckbox.parentElement.style.opacity = '0.4';
                            interpCheckbox.parentElement.title = 'Interpolation not available (all hitboxes are capsule-shaped)';
                        } else {
                            interpCheckbox.checked = true;
                            interpCheckbox.disabled = false;
                            interpCheckbox.parentElement.style.opacity = '1';
                            interpCheckbox.parentElement.title = '';
                        }
                        
                        // Populate the hitbox frames list
                        populateHitboxFramesList();
                    } else {
                        failed.push('hitboxes (no data for ' + move + ')');
                        document.getElementById('hitbox-frames-list').innerHTML = '<p style="color: #666; font-size: 0.85em;">No hitbox data for this move</p>';
                    }
                } else {
                    failed.push('hitboxes');
                    document.getElementById('hitbox-frames-list').innerHTML = '<p style="color: #666; font-size: 0.85em;">No hitbox data available</p>';
                }
                
                // Load animation - try character-specific filenames first
                const animFolder = getAnimFolder(character);
                const animFilenames = getAnimFilenames(character, move);
                
                
                // Build list of paths to try
                const animPaths = [];
                // HDR mods store override animations in numbered subfolders (c00, c01, ...)
                // Try subfolders FIRST so HDR overrides take priority over base game animations
                const subfolders = ['c00', 'c01', 'c02', 'c03', 'c04', 'c05', ''];
                for (const animFilename of animFilenames) {
                    for (const sub of subfolders) {
                        const subPath = sub ? `body/${sub}` : 'body';
                        // Try animation folder first (handles Mii characters -> miienemyf etc)
                        animPaths.push(`data/animations/${animFolder}/${subPath}/${animFilename}.json`);
                        // Also try original character name if different
                        if (animFolder !== character) {
                            animPaths.push(`data/animations/${character}/${subPath}/${animFilename}.json`);
                        }
                        // Also try charFolder if different from both
                        if (charFolder !== character && charFolder !== animFolder) {
                            animPaths.push(`data/animations/${charFolder}/${subPath}/${animFilename}.json`);
                        }
                    }
                    // Also try flat (no body/ folder) as a last resort
                    animPaths.push(`data/animations/${animFolder}/${animFilename}.json`);
                    if (animFolder !== character) {
                        animPaths.push(`data/animations/${character}/${animFilename}.json`);
                    }
                    if (charFolder !== character && charFolder !== animFolder) {
                        animPaths.push(`data/animations/${charFolder}/${animFilename}.json`);
                    }
                }
                
                
                for (const path of animPaths) {
                    try {
                        const animRes = await fetch(path);
                        if (animRes.ok) {
                            animationData = await animRes.json();
                            loaded.push('animation');
                            break;
                        } else {
                        }
                    } catch (e) {
                    }
                }
                
                if (!animationData) {
                    failed.push('animation');
                }
                
                // Update slider max - use getMaxFrame which accounts for motion rate
                document.getElementById('frame-slider').max = getMaxFrame();
                updateSliderTrack();
                
                currentFrame = 0;
                
                setStatus('');
                
                // Auto-fit: first try repositioning CENTER to fit all hitboxes at default SCALE.
                // Only zoom out if the total world-space span exceeds the canvas.
                SCALE = 20;  // Reset to default first
                autoFitCenterX = null;
                autoFitCenterY = null;
                
                if (hitboxData && hitboxData.hitboxes_by_frame && skeletonData) {
                    let maxWorldY = -Infinity;
                    let minWorldY = Infinity;
                    let maxWorldZ = -Infinity;
                    let minWorldZ = Infinity;
                    let hasData = false;
                    
                    function expandBounds(wy, wz, r) {
                        maxWorldY = Math.max(maxWorldY, wy + r);
                        minWorldY = Math.min(minWorldY, wy - r);
                        maxWorldZ = Math.max(maxWorldZ, wz + r);
                        minWorldZ = Math.min(minWorldZ, wz - r);
                        hasData = true;
                    }
                    
                    // Include skeleton bounds at frame 0 so the character is visible at start
                    const frame0Positions = calculateWorldTransformsForFrame(0);
                    if (frame0Positions) {
                        for (const [boneName, boneData] of Object.entries(frame0Positions)) {
                            const by = boneData.matrix[3][1];
                            const bz = boneData.matrix[3][2];
                            expandBounds(by, bz, 0);
                        }
                    }
                    
                    for (const [frameStr, frameHbs] of Object.entries(hitboxData.hitboxes_by_frame)) {
                        if (!frameHbs || frameHbs.length === 0) continue;
                        const realFrame = parseInt(frameStr) - 1;
                        const positions = calculateWorldTransformsForFrame(realFrame);
                        if (!positions) continue;
                        
                        for (const hb of frameHbs) {
                            const r = hb.size || 3;
                            const boneName = remapBone((hb.bone || 'top').toLowerCase(), positions);
                            let useBone = positions[boneName];
                            if (boneName === 'top' || boneName === 'throw') {
                                useBone = positions['trans'] || positions['rot'] || positions['hip'] || useBone;
                            }
                            if (!useBone) continue;
                            
                            const offset = hb.offset || {x: 0, y: 0, z: 0};
                            let worldY, worldZ;
                            if (boneName === 'top' || boneName === 'throw') {
                                worldZ = useBone.matrix[3][2] + offset.z;
                                worldY = useBone.matrix[3][1] + offset.y;
                            } else {
                                const rotOnly = normalizeMatrixRotation(useBone.matrix);
                                const wp = transformPoint(offset, rotOnly);
                                worldZ = wp.z;
                                worldY = wp.y;
                            }
                            expandBounds(worldY, worldZ, r);
                            
                            if (hb.is_capsule && hb.offset2) {
                                const o2 = hb.offset2;
                                let wy2, wz2;
                                if (boneName === 'top' || boneName === 'throw') {
                                    wz2 = useBone.matrix[3][2] + o2.z;
                                    wy2 = useBone.matrix[3][1] + o2.y;
                                } else {
                                    const rotOnly = normalizeMatrixRotation(useBone.matrix);
                                    const wp2 = transformPoint(o2, rotOnly);
                                    wz2 = wp2.z;
                                    wy2 = wp2.y;
                                }
                                expandBounds(wy2, wz2, r);
                            }
                        }
                    }
                    
                    if (hasData) {
                        const rect = canvas.parentElement.getBoundingClientRect();
                        const canvasH = rect.height - 70;
                        const canvasW = rect.width;
                        const margin = 30;
                        
                        // Screen mapping: screenY = -worldY * SCALE + CENTER_Y
                        //                 screenX =  worldZ * SCALE + CENTER_X
                        // Pixel span needed at current SCALE:
                        const pixelSpanY = (maxWorldY - minWorldY) * SCALE;
                        const pixelSpanZ = (maxWorldZ - minWorldZ) * SCALE;
                        
                        const availH = canvasH - 2 * margin;
                        const availW = canvasW - 2 * margin;
                        
                        if (pixelSpanY <= availH && pixelSpanZ <= availW) {
                            // Fits at default SCALE — just reposition CENTER
                            // Ideal CENTER_Y: center the content vertically
                            // screenY_top = -maxWorldY * SCALE + CY = margin  → want top at margin
                            // screenY_bot = -minWorldY * SCALE + CY = canvasH - margin  → want bottom at canvasH-margin
                            // Ideal CY = (margin + maxWorldY*SCALE + canvasH - margin + minWorldY*SCALE) / 2
                            const idealCY = (canvasH + (maxWorldY + minWorldY) * SCALE) / 2;
                            const idealCX = (canvasW - (maxWorldZ + minWorldZ) * SCALE) / 2;
                            
                            // Default positions from resizeCanvas logic
                            const movesStartLeft = ['dash_attack', 'dash_grab'];
                            const charsWithLongFsmash = ['simon', 'richter'];
                            const charsWithSlidingDtilt = ['rockman'];
                            let defaultCX = (movesStartLeft.includes(move)
                                || (move === 'fsmash' && charsWithLongFsmash.includes(character))
                                || (move === 'dtilt' && charsWithSlidingDtilt.includes(character)))
                                ? canvasW * 0.15 : canvasW / 2;
                            let defaultCY = (move === 'dair') ? canvasH * 0.6 : canvasH - 80;
                            
                            // Check if default center already fits
                            const topOK = -maxWorldY * SCALE + defaultCY >= margin;
                            const botOK = -minWorldY * SCALE + defaultCY <= canvasH - margin;
                            const leftOK = minWorldZ * SCALE + defaultCX >= margin;
                            const rightOK = maxWorldZ * SCALE + defaultCX <= canvasW - margin;
                            
                            if (!topOK || !botOK || !leftOK || !rightOK) {
                                // Default doesn't fit — reposition
                                // Shift minimally: only move enough to bring the off-screen edge visible,
                                // rather than fully centering (which pushes the other edge away)
                                if (!topOK && !botOK) {
                                    // Both off — must center
                                    autoFitCenterY = idealCY;
                                } else if (!topOK) {
                                    // Only top off — shift up just enough
                                    autoFitCenterY = margin + maxWorldY * SCALE;
                                } else if (!botOK) {
                                    // Only bottom off — shift down just enough
                                    autoFitCenterY = (canvasH - margin) + minWorldY * SCALE;
                                }
                                if (!leftOK && !rightOK) {
                                    autoFitCenterX = idealCX;
                                } else if (!leftOK) {
                                    autoFitCenterX = margin - minWorldZ * SCALE;
                                } else if (!rightOK) {
                                    autoFitCenterX = (canvasW - margin) - maxWorldZ * SCALE;
                                }
                            }
                        } else {
                            // Doesn't fit at default SCALE — zoom out
                            const scaleForH = availH / (maxWorldY - minWorldY);
                            const scaleForW = availW / (maxWorldZ - minWorldZ);
                            SCALE = Math.max(6, Math.floor(Math.min(scaleForH, scaleForW)));
                            
                            // Center at the new scale
                            autoFitCenterY = (canvasH + (maxWorldY + minWorldY) * SCALE) / 2;
                            autoFitCenterX = (canvasW - (maxWorldZ + minWorldZ) * SCALE) / 2;
                        }
                    }
                }
                
                resizeCanvas();
                
                // In hdrdle mode, apply UI changes and auto-play animation
                if (hdrdleMode) {
                    // Apply UI changes (hide controls, info panel, uncheck skeleton/hurtboxes)
                    applyHdrdleMode();
                    
                    // Use requestAnimationFrame to ensure browser recalculates layout
                    requestAnimationFrame(() => {
                        // Resize canvas now that UI elements are hidden
                        resizeCanvas();
                        
                        if (hdrdleFrame !== null && hdrdleFrame >= 0) {
                            currentFrame = hdrdleFrame - 1;
                        } else {
                            currentFrame = 0;
                        }
                        
                        // Always notify parent of current frame (for hdrdle hints)
                        notifyParentFrame(currentFrame + 1);  // Send 1-indexed game frame
                        
                        // Auto-play animation in hdrdle mode
                        if (hdrdleAutoPlay && !isPlaying) {
                            isPlaying = true;
                            const playBtn = document.getElementById('play-btn');
                            if (playBtn) playBtn.textContent = '⏸ Pause';
                            startPlayTimer();
                        }
                        
                        // Force a render with the new settings
                        render();
                    });
                } else if (hdrdleFrame !== null && hdrdleFrame >= 0) {
                    // Not in hdrdle mode but frame parameter specified - jump to that frame
                    currentFrame = hdrdleFrame - 1;
                    render();
                }
                
            } catch (error) {
                setStatus('Error: ' + error.message);
            }
        }
        
        loadData();
    </script>
</body>
</html>
