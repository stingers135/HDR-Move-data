<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HDR Hitbox Viewer</title>
    <style>
        :root {
            --hdr-green: #00cc44;
            --hdr-green-dark: #00aa33;
            --hdr-green-glow: rgba(0, 204, 68, 0.3);
            --hdr-bg-dark: #0a0a0a;
            --hdr-bg-lighter: #141414;
            --hdr-bg-card: #1a1a1a;
            --hdr-border: #2a2a2a;
            --hdr-text: #e0e0e0;
            --hdr-text-dim: #888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--hdr-bg-dark); color: var(--hdr-text); height: 100vh; overflow: hidden; }
        
        .viewer-container { display: flex; height: 100vh; }
        
        /* HDRDLE MODE: Hide UI via CSS immediately using URL param detection */
        /* This runs before JS loads, preventing answer from flashing */
        body.hdrdle-mode .info-panel { display: none !important; }
        body.hdrdle-mode .speed-control { display: none !important; }
        body.hdrdle-mode .slider-container { display: none !important; }
        body.hdrdle-mode .frame-display { display: none !important; }
        body.hdrdle-mode .canvas-area { flex: 1; }
        
        /* Left info panel */
        .info-panel {
            width: 280px;
            background: var(--hdr-bg-lighter);
            padding: 15px;
            overflow-y: auto;
            border-right: 1px solid var(--hdr-green);
        }
        
        .info-panel h2 { color: var(--hdr-green); font-size: 1.2em; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px var(--hdr-green-glow); }
        .info-panel h3 { color: var(--hdr-text-dim); font-size: 0.9em; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .move-info { background: var(--hdr-bg-card); padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid var(--hdr-border); }
        .move-info .label { color: var(--hdr-text-dim); font-size: 0.85em; }
        .move-info .value { color: var(--hdr-green); font-weight: bold; }
        
        .hitbox-card {
            background: var(--hdr-bg-card);
            border-left: 3px solid #ff4444;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
            font-size: 0.85em;
            border: 1px solid var(--hdr-border);
            border-left: 3px solid #ff4444;
        }
        
        .hitbox-card .stat { display: flex; justify-content: space-between; margin: 3px 0; }
        .hitbox-card .stat-label { color: var(--hdr-text-dim); }
        .hitbox-card .stat-value { color: var(--hdr-text); }
        
        /* Main canvas */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--hdr-bg-dark);
        }
        
        #canvas { flex: 1; }
        
        /* Controls */
        .controls {
            background: var(--hdr-bg-lighter);
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border-top: 1px solid var(--hdr-border);
        }
        
        .btn {
            padding: 8px 16px;
            background: linear-gradient(180deg, var(--hdr-green) 0%, var(--hdr-green-dark) 100%);
            border: none;
            border-radius: 4px;
            color: #000;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn:hover { box-shadow: 0 0 15px var(--hdr-green-glow); transform: scale(1.02); }
        
        .frame-slider { flex: 1; min-width: 200px; accent-color: var(--hdr-green); }
        
        /* Custom slider track container */
        .slider-container {
            flex: 1;
            min-width: 200px;
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
        }
        .slider-track {
            position: absolute;
            left: 8px;
            right: 8px;
            height: 6px;
            border-radius: 3px;
            background: var(--hdr-green);
            z-index: 1;
            pointer-events: none;
        }
        .slider-container .frame-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            position: relative;
            z-index: 2;
            width: 100%;
            height: 28px;
            margin: 0;
            cursor: pointer;
            flex: unset;
            min-width: unset;
        }
        .slider-container .frame-slider::-webkit-slider-runnable-track {
            background: transparent;
            height: 6px;
        }
        .slider-container .frame-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e0e0e0;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .slider-container .frame-slider::-moz-range-track {
            background: transparent;
            height: 6px;
            border: none;
        }
        .slider-container .frame-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e0e0e0;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        /* FAF marker */
        .faf-marker {
            position: absolute;
            z-index: 3;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateX(-50%);
        }
        .faf-tick {
            width: 2px;
            height: 20px;
            background: #B0B8C0;
            border-radius: 1px;
        }
        .faf-label {
            font-size: 0.65em;
            color: #B0B8C0;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-top: 1px;
            white-space: nowrap;
        }
        
        .frame-display {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--hdr-green);
            width: 260px;
            flex-shrink: 0;
            text-align: right;
            text-shadow: 0 0 10px var(--hdr-green-glow);
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            background: var(--hdr-bg-dark);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--hdr-border);
        }
        .speed-option {
            padding: 6px 10px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .speed-option:hover { color: #ccc; }
        .speed-option.active {
            background: linear-gradient(180deg, var(--hdr-green) 0%, var(--hdr-green-dark) 100%);
            color: #000;
        }
        
        .toggle-group { display: flex; gap: 15px; }
        .toggle-group label { display: flex; align-items: center; gap: 5px; color: var(--hdr-text-dim); font-size: 0.85em; cursor: pointer; }
        .toggle-group label input[type="checkbox"] { accent-color: var(--hdr-green); }
        
        /* Loading state */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1.2em;
            color: var(--hdr-text-dim);
        }
        
        .error { color: #ff4444; }
        .status-msg { font-size: 0.8em; color: var(--hdr-text-dim); margin-top: 10px; }
        
        /* Hitbox frame buttons */
        .frame-btn {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            background: var(--hdr-bg-card);
            border: 1px solid var(--hdr-border);
            border-radius: 3px;
            color: var(--hdr-text-dim);
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .frame-btn:hover {
            background: #2a2a2a;
            border-color: var(--hdr-green);
            color: var(--hdr-text);
        }
        .frame-btn.active {
            background: var(--hdr-green);
            border-color: var(--hdr-green);
            color: #000;
        }
        .frame-range {
            display: inline-block;
            padding: 4px 10px;
            margin: 2px;
            background: rgba(0, 204, 68, 0.1);
            border: 1px solid var(--hdr-green);
            border-radius: 3px;
            color: var(--hdr-green);
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .frame-range:hover {
            background: rgba(0, 204, 68, 0.2);
            color: #fff;
        }
        .frame-range.active {
            background: var(--hdr-green);
            color: #000;
        }
    </style>
    <!-- Immediate script to detect hdrdle mode BEFORE body renders -->
    <script>
        if (new URLSearchParams(window.location.search).get('hdrdle') === 'true') {
            document.write('<style>body{visibility:hidden}</style>');
            document.addEventListener('DOMContentLoaded', function() {
                document.body.classList.add('hdrdle-mode');
                document.body.style.visibility = 'visible';
            });
        }
    </script>
</head>
<body>
    <div class="viewer-container">
        <div class="info-panel">
            <h2 id="character-name">Loading...</h2>
            <div class="move-info">
                <div><span class="label">Move: </span><span class="value" id="move-name">-</span></div>
                <div id="faf-info" style="display:none;"><span class="label">FAF: </span><span class="value" id="faf-value">-</span></div>
            </div>
            
            <h3>Active Hitboxes</h3>
            <div id="hitbox-list">
                <p style="color: #666;">No hitboxes active</p>
            </div>
            
            <h3>Hitbox Frames</h3>
            <div id="hitbox-frames-list" style="margin-bottom: 15px;">
                <p style="color: #666; font-size: 0.85em;">Loading...</p>
            </div>
            
            <h3>Display Options</h3>
            <div class="toggle-group" style="flex-direction: column; gap: 8px; margin-top: 10px;">
                <label><input type="checkbox" id="show-skeleton" checked> Show Skeleton</label>
                <label><input type="checkbox" id="show-hurtboxes" checked> Show Hurtboxes</label>
                <label><input type="checkbox" id="show-hitboxes" checked> Show Hitboxes</label>
                <label><input type="checkbox" id="show-interpolation" checked> Interpolate Hitboxes</label>
                <label><input type="checkbox" id="show-names"> Show Bone Names</label>
            </div>
            
            <div class="status-msg" id="status-msg"></div>
        </div>
        
        <div class="canvas-area">
            <canvas id="canvas"></canvas>
            
            <div class="controls">
                <button class="btn" id="play-btn" onclick="togglePlay()" style="width:105px; text-align:center;">▶ Play</button>
                <div class="speed-control">
                    <button class="speed-option" onclick="setSpeed(0.25, this)">0.25x</button>
                    <button class="speed-option" onclick="setSpeed(0.5, this)">0.5x</button>
                    <button class="speed-option active" onclick="setSpeed(1, this)">1x</button>
                </div>
                <button class="btn" onclick="changeFrame(-1)">← Prev</button>
                <button class="btn" onclick="changeFrame(1)">Next →</button>
                <div class="slider-container" id="slider-container">
                    <div class="slider-track" id="slider-track"></div>
                    <div class="faf-marker" id="faf-marker" style="display:none;">
                        <div class="faf-tick"></div>
                        <div class="faf-label">FAF</div>
                    </div>
                    <input type="range" id="frame-slider" class="frame-slider" min="0" max="40" value="0">
                </div>
                <div class="frame-display">Frame <span id="frame-num">0</span> <span id="anim-frame-display" style="font-size: 0.7em; color: #888;"></span></div>
            </div>
        </div>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const character = urlParams.get('character') || 'mario';
        const move = urlParams.get('move') || 'fair';
        const stanceParam = urlParams.get('stance') || null;
        const hdrdleMode = urlParams.get('hdrdle') === 'true';
        const hdrdleFrame = urlParams.get('frame') ? parseInt(urlParams.get('frame')) : null;
        const hdrdleShowSkeleton = urlParams.get('showSkeleton') === 'true';
        const hdrdleShowHurtboxes = urlParams.get('showHurtboxes') === 'true';
        const hdrdleHideDamage = urlParams.get('hideDamage') !== 'false';  // default true in hdrdle
        const hdrdleHideAngle = urlParams.get('hideAngle') !== 'false';    // default true in hdrdle
        const hdrdleAutoPlay = urlParams.get('autoPlay') === 'true';
        const hdrdleShowFrameCounter = urlParams.get('showFrameCounter') === 'true';
        
        // Apply hdrdle mode settings after data loads
        function applyHdrdleMode() {
            if (!hdrdleMode) return;
            
            // Hide info panel
            const infoPanel = document.querySelector('.info-panel');
            if (infoPanel) infoPanel.style.display = 'none';
            
            // Make canvas area full width
            const canvasArea = document.querySelector('.canvas-area');
            if (canvasArea) canvasArea.style.flex = '1';
            
            // Set skeleton and hurtboxes based on hint params (default to off)
            const showSkeletonCheckbox = document.getElementById('show-skeleton');
            const showHurtboxesCheckbox = document.getElementById('show-hurtboxes');
            if (showSkeletonCheckbox) showSkeletonCheckbox.checked = hdrdleShowSkeleton;
            if (showHurtboxesCheckbox) showHurtboxesCheckbox.checked = hdrdleShowHurtboxes;
        }
        
        // Send current frame to parent window (for hdrdle hints)
        function notifyParentFrame(frame) {
            if (hdrdleMode && window.parent !== window) {
                window.parent.postMessage({
                    type: 'hdrdleFrame',
                    frame: frame
                }, '*');
            }
        }
        
        // Animation filename mapping (default)
        const ANIM_FILENAMES = {
            'jab1': 'c00attack11',
            'jab2': 'c00attack12',
            'jab3': 'c00attack13',
            'rapid_jab': 'c00attack100',
            'rapid_jab_finisher': 'c00attackend',
            'combo3': 'c00attack1combo3',
            'combo4': 'c00attack1combo4',
            'combo5': 'c00attack1combo5',
            'combo6': 'c00attack1combo6',
            'combo7': 'c00attack1combo7',
            'combo8': 'c00attack1combo8',
            'combo9': 'c00attack1combo9',
            'combo10': 'c00attack1combo10',
            'ftilt': 'c01attacks3s',
            'ftilt2': 'c01attacks3s2',  // Snake ftilt hit 2
            'ftilt3': 'c01attacks3s3',  // Meta Knight ftilt hit 3
            'utilt': 'c02attackhi3',
            'dtilt': 'c02attacklw3',
            'fsmash': 'c03attacks4s',
            'fsmash2': 'c03attacks4s2',  // Link/Snake fsmash hit 2
            'fsmash3': 'c03attacks4s3',  // Snake fsmash hit 3
            'usmash': 'c04attackhi4',
            'dsmash': 'c04attacklw4',
            'nair': 'c05attackairn',
            'fair': 'c05attackairf',
            'bair': 'c05attackairb',
            'uair': 'c05attackairhi',
            'dair': 'c05attackairlw',
            'dash_attack': 'c00attackdash',
            // Grabs
            'grab': 'e00catch',
            'dash_grab': 'e00catchdash',
            'pivot_grab': 'e00catchturn',
            'pummel': 'e00catchattack',
            // Throws
            'fthrow': 'e01throwf',
            'bthrow': 'e01throwb',
            'uthrow': 'e01throwhi',
            'dthrow': 'e01throwlw',
            // DK fthrow variants
            'fthrow_forward': 'e01throwff',
            'fthrow_back': 'e01throwfb',
            'fthrow_high': 'e01throwfhi',
            'fthrow_low': 'e01throwflw',
        };
        
        // Character-specific animation filename overrides
        // Format: character -> { move -> [array of filenames to try] }
        const CHARACTER_ANIM_OVERRIDES = {
            // Ken and Ryu have weak/strong variants
            'ryu': {
                'jab1': ['c00attack11w', 'c00attack11s', 'c00attack11'],
                'jab1_weak': ['c00attack11w'],
                'jab1_strong': ['c00attack11s'],
                'jab2': ['c00attack12s', 'c00attack12'],
                'jab2_strong': ['c00attack12s'],
                'ftilt': ['c01attacks3sw', 'c01attacks3ss', 'c01attacks3s'],
                'ftilt_weak': ['c01attacks3sw', 'c01attacks3s'],
                'ftilt_strong': ['c01attacks3ss', 'c01attacks3s'],
                'utilt': ['c02attackhi3w', 'c02attackhi3s', 'c02attackhi3'],
                'utilt_weak': ['c02attackhi3w', 'c02attackhi3'],
                'utilt_strong': ['c02attackhi3s', 'c02attackhi3'],
                'dtilt': ['c02attacklw3w', 'c02attacklw3s', 'c02attacklw3'],
                'dtilt_weak': ['c02attacklw3w', 'c02attacklw3'],
                'dtilt_strong': ['c02attacklw3s', 'c02attacklw3'],
            },
            'ken': {
                'jab1': ['c00attack11w', 'c00attack11s', 'c00attack11'],
                'jab1_weak': ['c00attack11w'],
                'jab1_strong': ['c00attack11s'],
                'jab2': ['c00attack12s', 'c00attack12'],
                'jab2_strong': ['c00attack12s'],
                'ftilt': ['c01attacks3sw', 'c01attacks3ss', 'c01attacks3s'],
                'ftilt_weak': ['c01attacks3sw', 'c01attacks3s'],
                'ftilt_strong': ['c01attacks3ss', 'c01attacks3s'],
                'utilt': ['c02attackhi3w', 'c02attackhi3s', 'c02attackhi3'],
                'utilt_weak': ['c02attackhi3w', 'c02attackhi3'],
                'utilt_strong': ['c02attackhi3s', 'c02attackhi3'],
                'dtilt': ['c02attacklw3w', 'c02attacklw3s', 'c02attacklw3'],
                'dtilt_weak': ['c02attacklw3w', 'c02attacklw3'],
                'dtilt_strong': ['c02attacklw3s', 'c02attacklw3'],
            },
            // Kazuya 10-hit combo - uses different animation filenames
            'demon': {
                'jab3': ['c00attack13'],  // Jab finisher (uses flashpunch hitbox data)
                'combo3': ['c00attack1combo3'],
                'combo4': ['c00attack1combo4'],
                'combo5': ['c00attack1combo5'],
                'combo6': ['c00attack1combo6'],
                'combo7': ['c00attack1combo7'],
                'combo8': ['c00attack1combo8'],
                'combo9': ['c00attack1combo9'],
                'combo10': ['c00attack1combo10'],
            },
            // Meta Knight rapid jab
            'metaknight': {
                'jab1': ['c00attack100', 'c00attack11'],
            },
            // Steve uses ftilt for jab/nair
            'pickel': {
                'jab1': ['c01attacks3s', 'c00attack11'],
                'nair': ['c01attacks3s', 'c05attackairn'],
            },
            // Ice Climbers folder mapping
            // Skeleton/hurtbox/hitbox use 'iceclimber', animations are only in 'popo' folder
            'popo': {
                '_folder': 'iceclimber',
                '_animFolder': 'popo',
            },
            'nana': {
                '_folder': 'iceclimber',
                '_animFolder': 'popo',  // Nana uses popo's animations (HDR only has popo folder)
            },
            // Mii characters use miienemy skeleton/hurtbox files,
            // but animations are under their own folder (miifighter/, etc.)
            'miifighter': {
                '_skeleton': 'miienemyf',
                '_hurtbox': 'miienemyf',
            },
            'miiswordsman': {
                '_skeleton': 'miienemys',
                '_hurtbox': 'miienemys',
            },
            'miigunner': {
                '_skeleton': 'miienemyg',
                '_hurtbox': 'miienemyg',
            },
            // Piranha Plant stance-specific animations
            // Key format: 'move__StanceName' checked first, then 'move', then default
            'packun': {
                'ftilt__Regular': ['c01attacks3sa'],       // Fire breath animation
                'ftilt__Prickly': ['c01attacks3s'],        // Same animation as Putrid ftilt
                'fsmash__Prickly': ['c03attacks4s2'],      // Prickly lunge animation
                'bair__Prickly': ['c05attackairbs'],       // Prickly bair-S (spike)
            },
            // Mega Man uses non-standard slot prefixes
            'rockman': {
                'ftilt': ['c02attacks3s'],
                'nair': ['c05attackairnmelee', 'c05attackairn'],
            },
        };
        
        // Helper function to get animation filenames for a character/move
        function getAnimFilenames(char, moveType) {
            const overrides = CHARACTER_ANIM_OVERRIDES[char];
            if (overrides) {
                // Check for stance-specific override first (e.g. 'ftilt__Regular')
                if (stanceParam && overrides[moveType + '__' + stanceParam]) {
                    return overrides[moveType + '__' + stanceParam];
                }
                // Then check for regular override
                if (overrides[moveType]) {
                    return overrides[moveType];
                }
            }
            // jab3 often uses rapid jab finisher animation (attack100end) instead of attack13
            if (moveType === 'jab3') {
                return ['c00attack100end', 'c00attack13'];
            }
            // rapid_jab_finisher: some characters use attack100end, others use attackend
            if (moveType === 'rapid_jab_finisher') {
                return ['c00attack100end', 'c00attackend'];
            }
            // ftilt2: snake/metaknight use attacks3s2, packun reuses ftilt anim
            if (moveType === 'ftilt2') {
                return ['c01attacks3s2', 'c01attacks3s'];
            }
            // Return default as single-item array
            return [ANIM_FILENAMES[moveType] || moveType];
        }
        
        // Helper function to get character folder (handles Ice Climbers etc)
        function getCharacterFolder(char) {
            const overrides = CHARACTER_ANIM_OVERRIDES[char];
            if (overrides && overrides['_folder']) {
                return overrides['_folder'];
            }
            return char;
        }
        
        // Helper function to get skeleton filename (handles Mii characters)
        function getSkeletonName(char) {
            const overrides = CHARACTER_ANIM_OVERRIDES[char];
            if (overrides && overrides['_skeleton']) {
                return overrides['_skeleton'];
            }
            return char;
        }
        
        // Helper function to get hurtbox filename (handles Mii characters)
        function getHurtboxName(char) {
            const overrides = CHARACTER_ANIM_OVERRIDES[char];
            if (overrides && overrides['_hurtbox']) {
                return overrides['_hurtbox'];
            }
            return char;
        }
        
        // Helper function to get animation folder (handles Mii characters)
        function getAnimFolder(char) {
            const overrides = CHARACTER_ANIM_OVERRIDES[char];
            if (overrides && overrides['_animFolder']) {
                return overrides['_animFolder'];
            }
            // Fall back to regular folder mapping
            return getCharacterFolder(char);
        }
        
        // Data storage
        let skeletonData = null;
        let animationData = null;
        let hurtboxData = null;
        let hitboxData = null;
        let projectileData = null;  // Projectile trajectory data for moves like Villager fair
        let projectileSpawnPos = null;  // Cached character position at projectile spawn frame
        let motionEvents = null;  // Motion rate events for frame calculation
        let currentFrame = 0;     // 0-indexed internal frame (displays as Frame 1)
        let isPlaying = false;
        let playTimer = null;
        let playbackSpeed = 2;  // 2 = default (60fps), 1 = half speed (30fps)
        
        // Stance system (Piranha Plant etc.)
        let allHitboxesCache = null;  // Full hitbox JSON for stance-switching
        let currentStance = null;     // Currently selected stance name
        
        // FAF (First Actionable Frame) for slider visualization
        // This is a 1-indexed game frame loaded from hitbox data
        let fafFrame = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let SCALE = 20;
        let CENTER_X = 400;

            const max = parseInt(slider.max) || 1;

                const containerWidth = container.offsetWidth;
